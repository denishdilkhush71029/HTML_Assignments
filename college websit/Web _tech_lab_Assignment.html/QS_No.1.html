<!DOCTYPE html>
<html>
<head>
    <title>Formatting Tags Demo</title>
</head>
<body>

    <h1>Welcome to my website</h1>
    <h2>Heading Level 2</h2>
    
    <p>This is a paragraph demonstrating formatting tags.</p>
    
    <p>
        This is bold text: <b>Welcome to my website</b><br>
        This is italic text: <i>Welcome to my website</i><br>
        This is underline text: <u>Welcome to my website</u><br>
        This is strong text: <strong>Welcome to my website</strong>
    </p>

</body>
</html>
