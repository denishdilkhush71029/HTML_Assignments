<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .options {
            margin-bottom: 15px;
        }

        .options input {
            margin-right: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #5a67d8;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>Registration Form</h2>

    <form>

        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter your name">

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter password">

        <label>Gender:</label>
        <div class="options">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <label>Hobbies:</label>
        <div class="options">
            <input type="checkbox"> Reading
            <input type="checkbox"> Gaming
            <input type="checkbox"> Sports
        </div>

        <input type="submit" value="Register">

    </form>
</div>

</body>
</html>
