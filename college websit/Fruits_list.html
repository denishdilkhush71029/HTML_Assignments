<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit List - English & Hindi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfdfd;
            padding: 40px;
            color: #333;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 10px;
        }
        ul {
            line-height: 1.8;
        }
        .fruit-name {
            font-weight: bold;
            color: #27ae60;
        }
        .hindi-text {
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Fruits List </h2>
        
        <ul>
            <li><span class="fruit-name">Apple</span> — <span class="hindi-text">सेब (Seb)</span></li>
            
            <li><span class="fruit-name">Mango</span> — <span class="hindi-text">आम (Aam)</span>
                <ul>
                    <li>Alphonso — हाफूस (Hapus)</li>
                    <li>Dasheri — दशहरी (Dasheri)</li>
                </ul>
            </li>
            
            <li><span class="fruit-name">Banana</span> — <span class="hindi-text">केला (Kela)</span></li>
            <li><span class="fruit-name">Pomegranate</span> — <span class="hindi-text">अनार (Anaar)</span></li>
            <li><span class="fruit-name">Grapes</span> — <span class="hindi-text">अंगूर (Angoor)</span></li>
        </ul>
    </div>

</body>
</html>
